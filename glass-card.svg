<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <!-- Liquid gradient definitions -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0080" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00dfd8" />
      <stop offset="100%" stop-color="#007cf0" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.15)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a" />

  <!-- Animated Orbs (Liquid effect) -->
  <circle cx="150" cy="100" r="140" fill="url(#grad1)">
    <animate attributeName="cy" values="100;160;100" dur="6s" repeatCount="indefinite" />
    <animate attributeName="cx" values="150;220;150" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="650" cy="300" r="160" fill="url(#grad2)">
    <animate attributeName="cy" values="300;220;300" dur="7s" repeatCount="indefinite" />
    <animate attributeName="cx" values="650;550;650" dur="9s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="200" r="110" fill="#ff0080" opacity="0.6">
    <animate attributeName="r" values="110;140;110" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="5s" repeatCount="indefinite" />
  </circle>

  <!-- Glass Card -->
  <g transform="translate(40, 40)">
    <!-- Main glass body -->
    <rect width="720" height="320" rx="24" fill="url(#glassGradient)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" />
    
    <!-- Inner highlights to enhance the glass look -->
    <rect width="716" height="316" x="2" y="2" rx="22" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
    
    <!-- Content -->
    <text x="60" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Hi 👋, I'm Aayush</text>
    <text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#e2e8f0">Software Engineer | Open Source Enthusiast</text>
    
    <text x="60" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff">💻 Top Technologies</text>
    
    <!-- Tech pills -->
    <g transform="translate(60, 240)">
      <rect x="0" y="0" width="110" height="36" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
      <text x="55" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">JavaScript</text>
      
      <rect x="120" y="0" width="80" height="36" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
      <text x="160" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">React</text>
      
      <rect x="210" y="0" width="90" height="36" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
      <text x="255" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Node.js</text>
      
      <rect x="310" y="0" width="80" height="36" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
      <text x="350" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Python</text>
      
      <rect x="400" y="0" width="100" height="36" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
      <text x="450" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">HTML/CSS</text>
    </g>
  </g>
</svg>
